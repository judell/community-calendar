<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Community Calendar</title>
    <style>
      @supports (-webkit-touch-callout: none) {
        input, select { font-size: 16px !important; }
      }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/rrule@2.8.1/dist/es5/rrule.min.js"></script>
    <script>console.log = function(){};</script>
    <script>
      var vxhr = new XMLHttpRequest();
      vxhr.open('GET', 'version.txt', false);
      vxhr.send();
      window.APP_VERSION = (vxhr.responseText || '').trim() || String(Date.now());
      var v = window.APP_VERSION;
      document.write('<script src="xmlui/xmlui-standalone.umd.js?v=' + v + '"><\/script>');
      document.write('<script src="xmlui/xmlui-masonry.js?v=' + v + '"><\/script>');
      document.write('<link rel="stylesheet" href="xmlui/xmlui-grid-layout.css?v=' + v + '">');
      document.write('<script src="xmlui/xmlui-grid-layout.js?v=' + v + '"><\/script>');
    </script>
    <script>
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'categories.json?v=' + window.APP_VERSION, false);
      xhr.send();
      window._categories = JSON.parse(xhr.responseText);
    </script>
    <script>
      var cxhr = new XMLHttpRequest();
      cxhr.open('GET', 'cities.json?v=' + window.APP_VERSION, false);
      cxhr.send();
      window._cities = JSON.parse(cxhr.responseText);
    </script>
    <script>
      document.write('<script src="helpers.js?v=' + window.APP_VERSION + '"><\/script>');
      document.write('<script src="xs-trace.js?v=' + window.APP_VERSION + '"><\/script>');
    </script>
    <script>
      // URL params, e.g. ?city=davis&mode=multicol
      const params = new URLSearchParams(window.location.search);
      const cityParam = params.get('city');
      window.layoutMode = params.get('mode') || 'list';
      window.setLayoutMode = function(val) {
        window.layoutMode = val;
        var url = new URL(window.location);
        if (val === 'multicol' || val === 'dashboard') { url.searchParams.set('mode', val); }
        else { url.searchParams.delete('mode'); }
        window.history.replaceState({}, '', url);
      };
      window.showListImages = params.get('images') !== 'preview';
      window.setShowListImages = function(val) {
        window.showListImages = val !== 'preview';
        var url = new URL(window.location);
        if (val === 'preview') { url.searchParams.set('images', 'preview'); }
        else { url.searchParams.delete('images'); }
        window.history.replaceState({}, '', url);
      };
      window.initialCategory = params.get('category') || '';
      window.initialSearch = params.get('search') || '';
      // Title-case a slug: "santarosa" -> "Santa Rosa", "raleighdurham" -> "Raleighdurham"
      // Override specific names that need special casing
      const cityNameOverrides = {
        santarosa: 'Santa Rosa Now', raleighdurham: 'Raleigh-Durham'
      };
      window.toDisplayName = function(slug) {
        if (!slug) return '';
        if (cityNameOverrides[slug]) return cityNameOverrides[slug];
        return slug.charAt(0).toUpperCase() + slug.slice(1);
      };
      window.cityFilter = cityParam || null;
      window.cityName = window.toDisplayName(cityParam);
      if (cityParam) {
        document.title = window.cityName + ' Community Calendar';
      }
      // Select a city: update URL, globals, and XMLUI var
      window.selectCity = function(slug) {
        const url = new URL(window.location);
        url.searchParams.set('city', slug);
        window.history.pushState({}, '', url);
        window.cityFilter = slug;
        window.cityName = window.toDisplayName(slug);
        document.title = window.cityName + ' Community Calendar';
      };

      // Supabase auth setup (credentials loaded from config.json by XMLUI)
      // We need to hardcode these here since this runs before XMLUI loads config
      const SUPABASE_URL = 'https://dzpdualvwspgqghrysyz.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_NnzobdoFNU39fjs84UNq8Q_X45oiMG5';
      window.SUPABASE_URL = SUPABASE_URL;
      window.SUPABASE_KEY = SUPABASE_KEY;
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Pre-populate auth from localStorage so XMLUI sees it at first render
      // (onAuthStateChange is async and may fire after XMLUI evaluates when expressions)
      // Only use cached session if the access token hasn't expired yet,
      // otherwise DataSources fire with a stale token before onAuthStateChange refreshes it
      window.authUser = null;
      window.authSession = null;
      try {
        var projRef = new URL(SUPABASE_URL).hostname.split('.')[0];
        var stored = localStorage.getItem('sb-' + projRef + '-auth-token');
        if (stored) {
          var parsed = JSON.parse(stored);
          if (parsed.user && parsed.expires_at) {
            var nowSec = Math.floor(Date.now() / 1000);
            if (parsed.expires_at > nowSec) {
              window.authUser = parsed.user;
              window.authSession = parsed;
            }
          }
        }
      } catch(e) {}

      window.signIn = (provider) => {
        const returnTo = window.location.origin + window.location.pathname + window.location.search;
        window.location.href = SUPABASE_URL +
          '/auth/v1/authorize?provider=' + (provider || 'github') + '&redirect_to=' + encodeURIComponent(returnTo);
      };

      window.signInWithEmail = async function(email, onSuccess) {
        const { error } = await sb.auth.signInWithOtp({
          email: email,
          options: { emailRedirectTo: window.location.origin + window.location.pathname + window.location.search }
        });
        if (error) alert('Error: ' + error.message);
        else if (onSuccess) onSuccess();
      };

      window.signOut = function() {
        console.log('signOut called');
        localStorage.removeItem('sb-dzpdualvwspgqghrysyz-auth-token');
        console.log('localStorage cleared, reloading...');
        window.location.reload();
      };

      sb.auth.onAuthStateChange(async (event, session) => {
        window.authSession = session;
        window.authUser = session?.user || null;
        console.log('Auth state changed:', event, window.authUser?.email);


        // Create feed token on first sign-in if it doesn't exist
        // Uses fetch directly since Supabase JS client has issues
        if (session?.user) {
          const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + session.access_token,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          };

          const checkUrl = `${SUPABASE_URL}/rest/v1/feed_tokens?select=token&user_id=eq.${session.user.id}`;
          const checkRes = await fetch(checkUrl, { headers });
          const existing = await checkRes.json();
          console.log('Feed token check:', existing);

          if (!existing || existing.length === 0) {
            const insertUrl = `${SUPABASE_URL}/rest/v1/feed_tokens`;
            const insertRes = await fetch(insertUrl, {
              method: 'POST',
              headers,
              body: JSON.stringify({ user_id: session.user.id })
            });
            if (insertRes.ok) {
              console.log('Created feed token for new user, reloading...');
              window.location.reload();
            } else {
              console.error('Error creating feed token:', insertRes.status);
            }
          }
        }
      });

      // Handle OAuth callback
      if (window.location.hash.includes('access_token')) {
        sb.auth.getSession().then(() => {
          window.location.replace(window.location.pathname + window.location.search);
        });
      }

      // Toggle pick for an event (add or remove from user's picks)
      // Uses fetch directly since Supabase JS client has issues with UMD bundle
      window.togglePick = async function(eventId) {
        console.log('togglePick called with eventId:', eventId);
        if (!window.authSession) {
          alert('Please sign in to pick events');
          return;
        }
        const headers = {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + window.authSession.access_token,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        };
        const userId = window.authUser.id;

        // Check if already picked
        const checkUrl = `${SUPABASE_URL}/rest/v1/picks?select=id&user_id=eq.${userId}&event_id=eq.${eventId}`;
        const checkRes = await fetch(checkUrl, { headers });
        const existing = await checkRes.json();
        console.log('Existing picks:', existing);

        if (existing && existing.length > 0) {
          // Remove pick
          console.log('Removing pick:', existing[0].id);
          const deleteUrl = `${SUPABASE_URL}/rest/v1/picks?id=eq.${existing[0].id}`;
          const deleteRes = await fetch(deleteUrl, { method: 'DELETE', headers });
          console.log('Delete response:', deleteRes.status);
          if (window.xsTraceEvent) window.xsTraceEvent('unpick', { eventId, status: deleteRes.status });
        } else {
          // Add pick
          console.log('Adding pick for event:', eventId);
          const insertUrl = `${SUPABASE_URL}/rest/v1/picks`;
          const insertRes = await fetch(insertUrl, {
            method: 'POST',
            headers,
            body: JSON.stringify({ user_id: userId, event_id: eventId })
          });
          console.log('Insert response:', insertRes.status);
          if (window.xsTraceEvent) window.xsTraceEvent('pick', { eventId, status: insertRes.status });
        }
      };
    </script>
    <script>
      // Date range helpers for upcoming events (one hour ago to three months out)
      // Pre-compute at load time to avoid timing issues with XMLUI expressions
      // Use ISO 8601 with UTC offset so Postgres compares correctly against timestamptz
      (function() {
        const now = new Date();
        const oneHourAgo = new Date(now.getTime() - 60 * 60 * 1000);
        const threeMonthsLater = new Date(now.getTime() + 90 * 24 * 60 * 60 * 1000);
        window.fromDate = oneHourAgo.toISOString();
        window.toDate = threeMonthsLater.toISOString();
        console.log('Date range initialized:', window.fromDate, 'to', window.toDate);
      })();

      // Keep functions for debugging
      window.getFromDate = function() { return window.fromDate; };
      window.getToDate = function() { return window.toDate; };
      window.getQueryMonths = function() {
        var from = new Date(window.fromDate);
        var to = new Date(window.toDate);
        return Math.round((to - from) / (30 * 24 * 60 * 60 * 1000));
      };
    </script>
  </head>
  <body>
  </body>
</html>
