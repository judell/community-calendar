name: Build CLI

on:
  workflow_dispatch:
  push:
    paths:
      - 'cli/**'
  pull_request:
    paths:
      - 'cli/**'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      working-directory: cli
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        EXT=""
        if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
        go build -o cc-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
        path: cli/cc-cli-*
