name: Release CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. cli-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      working-directory: cli
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        EXT=""
        if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
        go build -o cc-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
        path: cli/cc-cli-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag }}
        files: artifacts/cc-cli-*/*
        generate_release_notes: true
