    # MatSu (Matanuska-Susitna)
    # ==========================================
    - name: Scrape MatSu sources
      if: contains(steps.locations.outputs.list, 'matsu') && github.event.inputs.regenerate_only != 'true'
      run: |
        python scrapers/legistar.py --client matanuska --source "Mat-Su Borough Assembly" --output cities/matsu/matsu_borough_assembly.ics || true
        python scrapers/alaskavisit.py --output cities/matsu/alaskavisit.ics || true

    - name: Download MatSu live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'matsu')
      run: |
        cd cities/matsu
        # City of Wasilla (CivicPlus)
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=23" -o wasilla_library.ics || true
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=25" -o wasilla_menard_center.ics || true
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=26" -o wasilla_city_council.ics || true
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=27" -o wasilla_airport_advisory.ics || true
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=28" -o wasilla_planning.ics || true
        curl -sL "https://www.cityofwasilla.gov/common/modules/iCalendar/iCalendar.aspx?feed=calendar&catID=29" -o wasilla_parks_rec.ics || true
        # Mat-Su School District (Finalsite calendar-manager)
        curl -sL "https://www.matsuk12.us/fs/calendar-manager/events.ics?calendar_ids[]=134&calendar_ids[]=121&calendar_ids[]=31&calendar_ids[]=30&calendar_ids[]=117&calendar_ids[]=116&calendar_ids[]=74&calendar_ids[]=73&calendar_ids[]=70&calendar_ids[]=69&calendar_ids[]=115&calendar_ids[]=114&calendar_ids[]=29&calendar_ids[]=28&calendar_ids[]=113&calendar_ids[]=112&calendar_ids[]=111&calendar_ids[]=110&calendar_ids[]=54&calendar_ids[]=53&calendar_ids[]=109&calendar_ids[]=108&calendar_ids[]=68&calendar_ids[]=67&calendar_ids[]=107&calendar_ids[]=106&calendar_ids[]=105&calendar_ids[]=104&calendar_ids[]=103&calendar_ids[]=102&calendar_ids[]=72&calendar_ids[]=71&calendar_ids[]=101&calendar_ids[]=100&calendar_ids[]=26&calendar_ids[]=25&calendar_ids[]=66&calendar_ids[]=65&calendar_ids[]=98&calendar_ids[]=97&calendar_ids[]=64&calendar_ids[]=63&calendar_ids[]=120&calendar_ids[]=133&calendar_ids[]=124&calendar_ids[]=52&calendar_ids[]=51&calendar_ids[]=96&calendar_ids[]=95&calendar_ids[]=49&calendar_ids[]=48&calendar_ids[]=47&calendar_ids[]=46&calendar_ids[]=94&calendar_ids[]=93&calendar_ids[]=92&calendar_ids[]=91&calendar_ids[]=45&calendar_ids[]=44&calendar_ids[]=90&calendar_ids[]=89&calendar_ids[]=88&calendar_ids[]=87&calendar_ids[]=24&calendar_ids[]=23&calendar_ids[]=62&calendar_ids[]=61&calendar_ids[]=43&calendar_ids[]=42&calendar_ids[]=86&calendar_ids[]=85&calendar_ids[]=41&calendar_ids[]=40&calendar_ids[]=84&calendar_ids[]=83&calendar_ids[]=82&calendar_ids[]=81&calendar_ids[]=80&calendar_ids[]=79&calendar_ids[]=60&calendar_ids[]=59&calendar_ids[]=21&calendar_ids[]=20&calendar_ids[]=131&calendar_ids[]=58&calendar_ids[]=57&calendar_ids[]=39&calendar_ids[]=38&calendar_ids[]=78&calendar_ids[]=77&calendar_ids[]=37&calendar_ids[]=36&calendar_ids[]=76&calendar_ids[]=75&calendar_ids[]=56&calendar_ids[]=55&calendar_ids[]=35&calendar_ids[]=34&calendar_ids[]=33&calendar_ids[]=32" -o matsuk12.ics || true
        # Community calendars
        curl -sL "https://www.connectmatsu.org/events/list/?ical=1" -o connect_matsu.ics || true
        curl -sL "https://visitpalmer.com/?post_type=tribe_events&ical=1&eventDisplay=list" -o visit_palmer.ics || true
        # Outdoor / recreation
        curl -sL "https://skeetawk.com/?post_type=tribe_events&ical=1&eventDisplay=list" -o skeetawk.ics || true
        cd ../..
        python scripts/combine_ics.py --input-dir cities/matsu --output cities/matsu/combined.ics --name "MatSu Community Calendar"

    # ==========================================
    # Post-processing (all cities)
    # ==========================================
    - name: Convert ICS to JSON for Supabase
      run: |
        IFS=',' read -ra CITIES <<< "${{ steps.locations.outputs.list }}"
        echo "Processing cities: ${CITIES[*]}"
        for city in "${CITIES[@]}"; do
          city=$(echo "$city" | xargs)
          echo "Checking city: '$city'"
          # Save previous events.json (with categories) before overwriting
          if [ -f "cities/$city/events.json" ]; then
            cp "cities/$city/events.json" "cities/$city/events.prev.json"
          fi
          if [ -f "cities/$city/combined.ics" ]; then
            echo "Running ics_to_json for $city..."
            python scripts/ics_to_json.py "cities/$city/combined.ics" -o "cities/$city/events.json" --city "$city"
            echo "$city: Converted $(cat cities/$city/events.json | python -c 'import json,sys; print(len(json.load(sys.stdin)))') events to JSON"
            # Carry forward categories from previous build
            if [ -f "cities/$city/events.prev.json" ]; then
              python scripts/merge_categories.py "cities/$city/events.prev.json" "cities/$city/events.json"
              rm "cities/$city/events.prev.json"
            fi
          else
            echo "WARNING: cities/$city/combined.ics not found!"
            # Clean up prev file if no combined.ics
            rm -f "cities/$city/events.prev.json"
          fi
        done

    - name: Classify events in JSON files
      if: env.ANTHROPIC_API_KEY
      run: |
        IFS=',' read -ra CITIES <<< "${{ steps.locations.outputs.list }}"
        FILES=""
        for city in "${CITIES[@]}"; do
          city=$(echo "$city" | xargs)
          if [ -f "cities/$city/events.json" ]; then
            FILES="$FILES cities/$city/events.json"
          fi
        done
        if [ -n "$FILES" ]; then
          python scripts/classify_events_json.py $FILES
        fi

    - name: Generate feed health report
      run: |
        python scripts/report.py --cities ${{ steps.locations.outputs.list }} --build-log build.log

    - name: Generate PRODID platform report
      run: python scripts/prodid.py

    - name: Validate pipeline output
      run: |
        python scripts/validate_pipeline.py --cities ${{ steps.locations.outputs.list }}

    - name: Commit and push if changes
      env:
        GITHUB_TOKEN: ${{ secrets.COMMUNITY_CALENDAR }}
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        
        # Save generated files before any git operations
        for city in santarosa bloomington davis petaluma toronto raleighdurham montclair roanoke matsu; do
          if [ -f "cities/$city/events.json" ]; then
            cp "cities/$city/events.json" "/tmp/${city}_events.json"
          fi
        done
        
        # Write version tag for cache busting
        git describe --tags --always > version.txt

        git add .
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Auto-generate calendar"
          for i in 1 2 3; do
            git add -A
            if git pull --rebase --autostash && git push; then
              break
            fi
            echo "Push failed, restoring generated files and retrying..."
            # Restore generated files that may have been clobbered by rebase
            for city in santarosa bloomington davis petaluma toronto raleighdurham montclair roanoke matsu; do
              if [ -f "/tmp/${city}_events.json" ]; then
                cp "/tmp/${city}_events.json" "cities/$city/events.json"
              fi
            done
            git add .
            git diff --staged --quiet || git commit --amend --no-edit
            sleep 5
          done
        )

    - name: Trigger Supabase events reload
      env:
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        echo "Triggering Supabase Edge Function to reload events..."
        RESPONSE=$(curl -sL -X POST "${{ vars.SUPABASE_URL }}/functions/v1/load-events" \
          -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
          -H 'Content-Type: application/json')
        echo "$RESPONSE" | jq .

        # Check for success
        SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
        if [ "$SUCCESS" = "true" ]; then
          INSERTED=$(echo "$RESPONSE" | jq -r '.inserted')
          echo "Successfully loaded $INSERTED events into Supabase"
        else
          echo "Failed to load events"
          echo "$RESPONSE"
          exit 1
        fi

