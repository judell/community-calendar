name: Generate Calendar

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      locations:
        description: 'Locations to process (comma-separated: santarosa,bloomington,davis,petaluma or "all")'
        required: false
        default: 'all'
      regenerate_only:
        description: 'Skip scraping, only regenerate from existing local ICS files'
        required: false
        type: boolean
        default: false
      months:
        description: 'Number of months ahead to scrape (default: 2)'
        required: false
        default: '2'
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    env:
      SCRAPE_MONTHS: ${{ github.event.inputs.months || '2' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}
      #ENABLE_FUZZY_DEDUP: ${{ secrets.ANTHROPIC_API_KEY && 'true' || '' }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up build logging
      run: |
        > $GITHUB_WORKSPACE/build.log
        echo 'exec 2> >(tee -a $GITHUB_WORKSPACE/build.log >&2)' > /tmp/bash_env.sh
        echo "BASH_ENV=/tmp/bash_env.sh" >> $GITHUB_ENV

    - name: Determine locations to process
      id: locations
      run: |
        INPUT="${{ github.event.inputs.locations }}"
        if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
          # Derive city list from cities/ directory (any subdir with a feeds.txt)
          ALL=$(ls -d cities/*/feeds.txt 2>/dev/null | sed 's|cities/||;s|/feeds.txt||' | paste -sd, -)
          ALL="roanoke,matsu"
          echo "list=$ALL" >> $GITHUB_OUTPUT
        else
          echo "list=$INPUT" >> $GITHUB_OUTPUT
        fi

    # ==========================================
    # Santa Rosa
    # ==========================================
    - name: Scrape Santa Rosa sources
      if: contains(steps.locations.outputs.list, 'santarosa') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Santa Rosa..."
        python scripts/library_intercept.py --location santarosa --output cities/santarosa/library_intercept.ics || true
        python scrapers/cityspark/bohemian.py --output cities/santarosa/bohemian.ics || true
        python scrapers/cityspark/pressdemocrat.py --output cities/santarosa/pressdemocrat.ics || true
        python scrapers/sonoma_parks.py --output cities/santarosa/sonoma_parks.ics || true
        python scrapers/cal_theatre.py --output cities/santarosa/cal_theatre.ics || true
        python scrapers/copperfields.py --output cities/santarosa/copperfields.ics || true
        python scrapers/sonoma_county_gov.py --output cities/santarosa/sonoma_county_gov.ics || true
        python scrapers/wix/cafefrida.py --output cities/santarosa/cafefrida.ics || true
        python scrapers/srcc.py --output cities/santarosa/srcc.ics || true
        python scrapers/barrel_proof.py --output cities/santarosa/barrel_proof.ics || true
        python scrapers/sportsbasement.py --location "Santa Rosa" --output cities/santarosa/sportsbasement.ics || true
        python scrapers/sebarts.py --output cities/santarosa/sebarts.ics || true
        python scrapers/santa_rosa_arts_center.py --output cities/santarosa/santa_rosa_arts_center.ics || true
        python scrapers/movingwriting.py --output cities/santarosa/movingwriting.ics || true
        python scrapers/legistar.py --client santa-rosa --source "City of Santa Rosa Legistar" -o cities/santarosa/legistar.ics || true
        python scrapers/spreckels.py --output cities/santarosa/spreckels.ics || true
        python scrapers/lagunitas.py --output cities/santarosa/lagunitas.ics || true
        python scrapers/creative_sonoma.py --output cities/santarosa/creative_sonoma.ics || true
        python scrapers/cinnabar.py --output cities/santarosa/cinnabar.ics || true
        python scrapers/green_music_center.py --output cities/santarosa/green_music_center.ics || true
        # Santa Rosa area high schools (MaxPreps)
        python scrapers/maxpreps.py --school santa-rosa-panthers --output cities/santarosa/maxpreps_santa_rosa_high.ics || true
        python scrapers/maxpreps.py --school montgomery-vikings --output cities/santarosa/maxpreps_montgomery_high.ics || true
        python scrapers/maxpreps.py --school maria-carrillo-pumas --output cities/santarosa/maxpreps_maria_carrillo.ics || true
        python scrapers/maxpreps.py --school piner-prospectors --output cities/santarosa/maxpreps_piner_high.ics || true
        python scrapers/maxpreps.py --school elsie-allen-lobos --output cities/santarosa/maxpreps_elsie_allen.ics || true
        python scrapers/maxpreps.py --school cardinal-newman-cardinals --output cities/santarosa/maxpreps_cardinal_newman.ics || true
        python scrapers/jack_london_park.py --output cities/santarosa/jack_london_park.ics || true

        echo "\n=== Santa Rosa Scraper Results ==="
        for f in cities/santarosa/*.ics; do
          if [ -f "$f" ]; then
            events=$(grep -c 'BEGIN:VEVENT' "$f" 2>/dev/null) || events=0
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null || echo 0)
            name=$(basename "$f")
            if [ "$events" -gt 0 ]; then
              echo "  ✅ $name: $events events"
            elif [ "$size" -gt 100 ]; then
              echo "  ⚠️ $name: no events (but file exists)"
            else
              echo "  ❌ $name: empty or missing"
            fi
          fi
        done
      continue-on-error: true

    - name: Download Santa Rosa live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'santarosa')
      run: |
        cd cities/santarosa
        curl -sL "https://calendar.google.com/calendar/ical/eventsatarlenefransictheater@gmail.com/public/basic.ics" -o arlene_francis_theater.ics || true
        curl -sL "https://lutherburbankcenter.org/events/?ical=1" -o luther_burbank_center.ics || true
        curl -sL "https://schulzmuseum.org/events/?ical=1" -o schulz_museum.ics || true
        curl -sL "https://www.sonoma.com/events/?ical=1" -o sonoma_com.ics || true
        curl -sL "https://golocal.coop/?post_type=tribe_events&ical=1&eventDisplay=list" -o golocal_coop.ics || true
        curl -sL "https://sonomacountyaa.org/events/?ical=1" -o sonoma_county_aa.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/dsasonomacounty%40gmail.com/public/basic.ics" -o sonoma_county_dsa.ics || true
        # Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/sonoma-county-go-wild-hikers/events/ical/" -o meetup_go_wild_hikers.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/shutupandwritewinecountry/events/ical/" -o meetup_shutupandwrite.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/scottish-country-dancing/events/ical/" -o meetup_scottish_dancing.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/sonoma-county-womens-wine-club/events/ical/" -o meetup_womens_wine_club.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/santa-rosa-toastmasters-public-speaking-meetup-group/events/ical/" -o meetup_toastmasters.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/nataraja-school-of-traditional-yoga/events/ical/" -o meetup_yoga.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/santa-rosa-womens-creativity-collective/events/ical/" -o meetup_creativity.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/sonoma-county-boomers/events/ical/" -o meetup_boomers.ics || true
        curl -sL "https://tockify.com/api/feeds/ics/rileystreet.art.com" -o rileystreet_art.ics || true
        # LiveWhale
        curl -sL "https://calendar.santarosa.edu/live/ical/events" -o srjc.ics || true
        # Additional Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/amorc-santa-rosa-pronaos/events/ical/" -o meetup_amorc.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/sarogn/events/ical/" -o meetup_sarogn.ics || true
        curl -sL "https://sonomacommunitycenter.org/events/?ical=1" -o sonomacommunitycenter.ics || true
        curl -sL "https://www.srsymphony.org/events/?ical=1" -o srsymphony.ics || true
        curl -sL "https://uptowntheatrenapa.com/events/?ical=1" -o uptowntheatrenapa.ics || true
        cd ../..
        python scripts/enrich_meetup_images.py --dir cities/santarosa || true
        python scripts/combine_ics.py --input-dir cities/santarosa --output cities/santarosa/combined.ics --name "Santa Rosa Community Calendar"

    # ==========================================
    # Bloomington
    # ==========================================
    - name: Scrape Bloomington sources
      if: contains(steps.locations.outputs.list, 'bloomington') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Bloomington..."
        python scripts/library_intercept.py --location bloomington --output cities/bloomington/library_intercept.ics || true
        python scrapers/buskirk_chumley.py --output cities/bloomington/buskirk_chumley.ics || true
        python scrapers/comedy_attic.py --output cities/bloomington/comedy_attic.ics || true
        python scrapers/the_bishop.py --output cities/bloomington/the_bishop.ics || true
        python scrapers/squarespace.py --url "https://www.peoplesmarketbtown.org/gatherings" --name "People's Market" -o cities/bloomington/peoples_market.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/78904-bluebird" --name "The Bluebird" --output cities/bloomington/songkick_bluebird.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3607354-blockhouse-bar" --name "Blockhouse Bar" --output cities/bloomington/songkick_blockhouse.ics || true
        python scrapers/squarespace.py --url "https://www.cardinalspirits.com/events" --name "Cardinal Spirits" -o cities/bloomington/cardinal_spirits.ics || true
        python scrapers/squarespace.py --url "https://www.sassafrasaudubon.org/upcomingevents" --name "Sassafras Audubon Society" -o cities/bloomington/sassafras_audubon.ics || true
        python scrapers/squarespace.py --url "https://www.mcmga.net/events" --name "Monroe County Master Gardeners" -o cities/bloomington/master_gardeners.ics || true
        python scrapers/sycamore_land_trust.py --output cities/bloomington/sycamore_land_trust.ics || true
        python scrapers/spektrix.py --base-url "https://tickets.seeconstellation.org/constellation" --name "Constellation Stage & Screen" --output cities/bloomington/constellation.ics || true
        python scrapers/shopify_events.py --url "https://cicadacinema.com" --name "Cicada Cinema" --output cities/bloomington/cicada_cinema.ics || true
      continue-on-error: true

    - name: Download Bloomington live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'bloomington')
      run: |
        cd cities/bloomington
        curl -sL "https://bgcbloomington.org/events/list/?ical=1" -o bgc_bloomington.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_1b95au4d2ueudldosb024fimp0@group.calendar.google.com/public/basic.ics" -o bloomington_gov.ics || true
        curl -sL "https://tockify.com/api/feeds/ics/bloomington.arts.calendar" -o bloomington_arts.ics || true
        # IU LiveWhale feeds
        curl -sL "https://events.iu.edu/live/ical/events/group_id/56" -o iu_jacobs_music.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/378" -o iu_auditorium.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/234" -o iu_eskenazi_museum.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/81" -o iu_cinema.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/59" -o iu_la_casa.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/64" -o iu_maurer_law.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/343" -o iu_kelley_business.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/130" -o iu_arts_humanities.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/261" -o iu_libraries.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/218" -o iu_theatre_dance.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/314" -o iu_asian_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/275" -o iu_first_nations.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/237" -o iu_lgbtq_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/221" -o iu_black_film.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/235" -o iu_neal_marshall.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/135" -o iu_hamilton_lugar.ics || true
        # B-Square Bulletin Google Calendars
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_35a6qiaiperdn7b1r6v2ksjlig@group.calendar.google.com/public/basic.ics" -o bsquare_government.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/4dj0guhji982ca5k90ljeliul0@group.calendar.google.com/public/basic.ics" -o bsquare_misc_civic.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2gd73d7gc46mstrdnr6k7v7b2o@group.calendar.google.com/public/basic.ics" -o bsquare_critical_mass.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/c_02o6fd3erhdmhe4oc5so149ir0@group.calendar.google.com/public/basic.ics" -o bsquare_bptc.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/d1087e97d4ace1c1ca2dd6336d417bea870ddac277be6d1711cbc0235aa85228%40group.calendar.google.com/public/basic.ics" -o btonline_events.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/j6botrehcce8vobqe6vpb4hnhk%40group.calendar.google.com/public/basic.ics" -o btonline_food.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2db8c2cf65a3558e38c4caaea43cb56e722090235237a95f137b087306353e51%40group.calendar.google.com/public/basic.ics" -o btonline_shopping.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_1rosks8nont4ebaq41tfgg8v7g@group.calendar.google.com/public/basic.ics" -o parks_and_rec.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/knobstone-hiking-trail-association-of-indiana-meetup/events/ical/" -o meetup_knobstone_hiking_trail_association_of_indiana_meetup.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/Bloomington-Atheists-and-Rationally-Awesome-People/events/ical/" -o meetup_bloomington_atheists_and_rationally_awesome_people.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_0l6e93fe54psagva4dhojra2q0@group.calendar.google.com/public/basic.ics" -o farmers_market.ics || true
        curl -sL "https://www.lotusfest.org/events/?ical=1" -o lotusfest.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/cuc66guoam1hhcqq2rnaniinl8%40group.calendar.google.com/public/basic.ics" -o calendar_cuc66guoam1hhcqq2rnaniinl8_40group_calend.ics || true
        # IU LibCal feeds
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=5914" -o iu_libcal_screening_room.ics || true
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=1228" -o iu_libcal_scholars_commons.ics || true
        # CampusLabs / beINvolved (student org events)
        curl -sL "https://iub.campuslabs.com/engage/events.ics" -o iu_campuslabs.ics || true
        # Community ICS feeds
        curl -sL "https://wonderlab.org/events/?ical=1" -o wonderlab.ics || true
        curl -sL "https://firstuc.org/events/?ical=1" -o first_united_church.ics || true
        curl -sL "https://www.bloomingtoncommunityband.org/events/?ical=1" -o community_band.ics || true
        curl -sL "https://browncountyplayhouse.org/events/?ical=1" -o brown_county_playhouse.ics || true
        curl -sL "https://uplandbeer.com/events/?ical=1" -o upland_brewing.ics || true
        # Google Calendar feeds
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_r7b1mkrme1r8uhl3b5amhb50bc@group.calendar.google.com/public/basic.ics" -o city_boards_commissions.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloominglabs%40gmail.com/public/basic.ics" -o bloominglabs.ics || true
        # Meetup feeds (Board Games: 403 private; Remote Workers: dormant — removed 2026-03)

        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_c657mi332p5sjpq2lcht9imu60%40group.calendar.google.com/public/basic.ics" -o calendar_bloomington_in_gov_c657mi332p5sjpq2lcht9i.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/shweekend%40gmail.com/public/basic.ics" -o calendar_shweekend_40gmail_com_public.ics || true
        curl -sL "https://writersguildbloomington.com/?plugin=all-in-one-event-calendar&controller=ai1ec_exporter_controller&action=export_events&no_html=true" -o writersguildbloomington.ics || true
        curl -sL "https://bloomspinweave.org/?post_type=tribe_events&ical=1&eventDisplay=list" -o bloomspinweave.ics || true
        curl -sL "https://www.hoosierflyfishers.com/events/list/?ical=1" -o hoosierflyfishers_list.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/r5lf3al9blontcsjnedbr2f2u0%40group.calendar.google.com/public/basic.ics" -o calendar_r5lf3al9blontcsjnedbr2f2u0_40group_calend.ics || true
        cd ../..
        python scripts/enrich_meetup_images.py --dir cities/bloomington || true
        python scripts/enrich_meetup_images.py --any-url \
          cities/bloomington/buskirk_chumley.ics \
          cities/bloomington/comedy_attic.ics \
          cities/bloomington/the_bishop.ics \
          cities/bloomington/cicada_cinema.ics \
          cities/bloomington/peoples_market.ics \
          cities/bloomington/cardinal_spirits.ics \
          cities/bloomington/sassafras_audubon.ics \
          cities/bloomington/master_gardeners.ics \
          cities/bloomington/sycamore_land_trust.ics \
          cities/bloomington/songkick_bluebird.ics \
          cities/bloomington/songkick_blockhouse.ics || true
        python scripts/combine_ics.py --input-dir cities/bloomington --output cities/bloomington/combined.ics --name "Bloomington Community Calendar"

    # ==========================================
    # Davis
    # ==========================================
    - name: Scrape Davis sources
      if: contains(steps.locations.outputs.list, 'davis') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Davis..."
        python scrapers/ucdavis_arts.py --output cities/davis/ucdavis_arts.ics || true
        python scrapers/ucdavis_library.py --output cities/davis/ucdavis_library.ics || true
        python scrapers/ucdavis_campusgroups.py --output cities/davis/ucdavis_campusgroups.ics || true
        python scrapers/davis_downtown.py --output cities/davis/davis_downtown.ics || true
        python scrapers/yolo_library.py --output cities/davis/yolo_library.ics || true
        python scrapers/uudavis.py --output cities/davis/uudavis.ics || true
        python cities/davis/scrapers/mondavi_center.py --output cities/davis/mondavi_center.ics || true
        python scrapers/davis_chamber.py --output cities/davis/davis_chamber.ics || true
        python scrapers/ucdavis_athletics.py --output cities/davis/ucdavis_athletics.ics || true
      continue-on-error: true

    - name: Download Davis Meetup feeds
      if: contains(steps.locations.outputs.list, 'davis')
      run: |
        cd cities/davis
        # Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/mosaics/events/ical/" -o meetup_mosaics.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/intercultural-mosaics/events/ical/" -o meetup_intercultural.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/yolo-county-board-game-gathering/events/ical/" -o meetup_board_games.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/pence-adult-art-programs/events/ical/" -o meetup_pence_art.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/art-in-action/events/ical/" -o meetup_art_in_action.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/mindful-embodied-spirituality/events/ical/" -o meetup_mindful.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/winters-shut-up-and-write-meetup-group/events/ical/" -o meetup_winters_write.ics || true
        # tribe_events ICS feeds
        curl -sL -A "Mozilla/5.0" "https://thedirt.online/events/?ical=1" -o thedirt.ics || true
        curl -sL -A "Mozilla/5.0" "https://visitdavis.org/events/?ical=1" -o visitdavis.ics || true
        curl -sL -A "Mozilla/5.0" "https://visityolo.com/event/?ical=1" -o visityolo.ics || true
        curl -sL -A "Mozilla/5.0" "https://putahcreekcouncil.org/events/?ical=1" -o putahcreek.ics || true
        curl -sL -A "Mozilla/5.0" "https://hatefreetogether.org/events/?ical=1" -o hatefreetogether.ics || true
        # Google Calendar feeds
        curl -sL "https://calendar.google.com/calendar/ical/davisbikeclubwww%40gmail.com/public/basic.ics" -o davis_bike_club.ics || true
        cd ../..

    - name: Combine Davis ICS
      if: contains(steps.locations.outputs.list, 'davis')
      run: |
        python scripts/enrich_meetup_images.py --dir cities/davis || true
        python scripts/combine_ics.py --input-dir cities/davis --output cities/davis/combined.ics --name "Davis Community Calendar"

    # ==========================================
    # Petaluma
    # ==========================================
    - name: Scrape Petaluma sources
      if: contains(steps.locations.outputs.list, 'petaluma') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Petaluma..."
