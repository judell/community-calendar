name: Generate Calendar

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      locations:
        description: 'Locations to process (comma-separated: santarosa,bloomington,davis,petaluma or "all")'
        required: false
        default: 'all'
      regenerate_only:
        description: 'Skip scrapers, still download ICS feeds, then regenerate'
        required: false
        type: boolean
        default: false
      months:
        description: 'Number of months ahead to scrape (default: 2)'
        required: false
        default: '2'
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    env:
      SCRAPE_MONTHS: ${{ github.event.inputs.months || '2' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #ENABLE_FUZZY_DEDUP: ${{ secrets.ANTHROPIC_API_KEY && 'true' || '' }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up build logging
      run: |
        > $GITHUB_WORKSPACE/build.log
        echo 'exec 2> >(tee -a $GITHUB_WORKSPACE/build.log >&2)' > /tmp/bash_env.sh
        echo "BASH_ENV=/tmp/bash_env.sh" >> $GITHUB_ENV

    - name: Determine locations to process
      id: locations
      run: |
        INPUT="${{ github.event.inputs.locations }}"
        if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
          # Derive city list from cities/ directory (any subdir with a feeds.txt)
          ALL=$(ls -d cities/*/feeds.txt 2>/dev/null | sed 's|cities/||;s|/feeds.txt||' | paste -sd, -)
          echo "list=$ALL" >> $GITHUB_OUTPUT
        else
          echo "list=$INPUT" >> $GITHUB_OUTPUT
        fi

    # ==========================================
    # Santa Rosa
    # ==========================================
    - name: Scrape Santa Rosa sources
      if: contains(steps.locations.outputs.list, 'santarosa') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Santa Rosa..."
        python scripts/library_intercept.py --location santarosa --output cities/santarosa/library_intercept.ics || true
        python scrapers/cityspark/bohemian.py --output cities/santarosa/bohemian.ics || true
        python scrapers/cityspark/pressdemocrat.py --output cities/santarosa/pressdemocrat.ics || true
        python scrapers/sonoma_parks.py --output cities/santarosa/sonoma_parks.ics || true
        python scrapers/cal_theatre.py --output cities/santarosa/cal_theatre.ics || true
        python scrapers/copperfields.py --output cities/santarosa/copperfields.ics || true
        python scrapers/sonoma_county_gov.py --output cities/santarosa/sonoma_county_gov.ics || true
        python scrapers/wix/cafefrida.py --output cities/santarosa/cafefrida.ics || true
        python scrapers/srcc.py --output cities/santarosa/srcc.ics || true
        python scrapers/barrel_proof.py --output cities/santarosa/barrel_proof.ics || true
        python scrapers/sportsbasement.py --location "Santa Rosa" --output cities/santarosa/sportsbasement.ics || true
        python scrapers/sebarts.py --output cities/santarosa/sebarts.ics || true
        python scrapers/santa_rosa_arts_center.py --output cities/santarosa/santa_rosa_arts_center.ics || true
        python scrapers/movingwriting.py --output cities/santarosa/movingwriting.ics || true
        python scrapers/legistar.py --client santa-rosa --source "City of Santa Rosa Legistar" -o cities/santarosa/legistar.ics || true
        python scrapers/spreckels.py --output cities/santarosa/spreckels.ics || true
        python scrapers/lagunitas.py --output cities/santarosa/lagunitas.ics || true
        python scrapers/creative_sonoma.py --output cities/santarosa/creative_sonoma.ics || true
        python scrapers/cinnabar.py --output cities/santarosa/cinnabar.ics || true
        python scrapers/green_music_center.py --output cities/santarosa/green_music_center.ics || true
        # Santa Rosa area high schools (MaxPreps)
        python scrapers/maxpreps.py --school santa-rosa-panthers --output cities/santarosa/maxpreps_santa_rosa_high.ics || true
        python scrapers/maxpreps.py --school montgomery-vikings --output cities/santarosa/maxpreps_montgomery_high.ics || true
        python scrapers/maxpreps.py --school maria-carrillo-pumas --output cities/santarosa/maxpreps_maria_carrillo.ics || true
        python scrapers/maxpreps.py --school piner-prospectors --output cities/santarosa/maxpreps_piner_high.ics || true
        python scrapers/maxpreps.py --school elsie-allen-lobos --output cities/santarosa/maxpreps_elsie_allen.ics || true
        python scrapers/maxpreps.py --school cardinal-newman-cardinals --output cities/santarosa/maxpreps_cardinal_newman.ics || true
        python scrapers/jack_london_park.py --output cities/santarosa/jack_london_park.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3757589-elephant-in-the-room" --name "Elephant in the Room (Songkick)" --output cities/santarosa/songkick_elephant.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/elephant-in-the-room-45984150493" --name "Elephant in the Room (Eventbrite)" --output cities/santarosa/eventbrite_elephant.ics || true
        python scrapers/sweetwater.py --output cities/santarosa/sweetwater.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/1633868-sweetwater-music-hall" --name "Sweetwater Music Hall" --output cities/santarosa/songkick_sweetwater.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/9969-mystic-theatre" --name "Mystic Theatre" --output cities/santarosa/songkick_mystic.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/108265-hopmonk-tavern-sebastopol" --name "HopMonk Tavern Sebastopol" --output cities/santarosa/songkick_hopmonk.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4320-phoenix-theater" --name "Phoenix Theater" --output cities/santarosa/songkick_phoenix.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4472014-will-call" --name "The Will Call" --output cities/santarosa/songkick_will_call.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3375329-blue-note-napa" --name "Blue Note Napa" --output cities/santarosa/songkick_blue_note.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/86109-rancho-nicasio" --name "Rancho Nicasio (Songkick)" --output cities/santarosa/songkick_rancho_nicasio.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/2928808-big-easy" --name "The Big Easy (Songkick)" --output cities/santarosa/songkick_big_easy.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3239334-twin-oaks-roadhouse" --name "Twin Oaks Roadhouse" --output cities/santarosa/songkick_twin_oaks.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4370054-lost-church" --name "The Lost Church" --output cities/santarosa/songkick_lost_church.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4186454-fern-bar" --name "The Fern Bar" --output cities/santarosa/songkick_fern_bar.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4364786-shady-oak-barrel-house" --name "Shady Oak Barrel House" --output cities/santarosa/songkick_shady_oak.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4426320-222" --name "THE 222" --output cities/santarosa/songkick_222.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/877176-rio-nido-roadhouse" --name "Rio Nido Roadhouse" --output cities/santarosa/songkick_rio_nido.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/1900888-redwood-cafe" --name "Redwood Cafe" --output cities/santarosa/songkick_redwood_cafe.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/4617123-henhouse-brewing" --name "HenHouse Brewing" --output cities/santarosa/songkick_henhouse.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/phoenix-theater-26319831111" --name "Phoenix Theater (Eventbrite)" --output cities/santarosa/eventbrite_phoenix.ics || true
        python scrapers/mobilize.py --url "https://www.mobilize.us/indivisiblesonomacounty/" --name "Indivisible Sonoma County (Mobilize)" --output cities/santarosa/mobilize_indivisible_sonoma.ics || true

        echo "\n=== Santa Rosa Scraper Results ==="
        for f in cities/santarosa/*.ics; do
          if [ -f "$f" ]; then
            events=$(grep -c 'BEGIN:VEVENT' "$f" 2>/dev/null) || events=0
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null || echo 0)
            name=$(basename "$f")
            if [ "$events" -gt 0 ]; then
              echo "  ✅ $name: $events events"
            elif [ "$size" -gt 100 ]; then
              echo "  ⚠️ $name: no events (but file exists)"
            else
              echo "  ❌ $name: empty or missing"
            fi
          fi
        done
      continue-on-error: true


    # ==========================================
    # Bloomington
    # ==========================================
    - name: Scrape Bloomington sources
      if: contains(steps.locations.outputs.list, 'bloomington') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Bloomington..."
        python scripts/library_intercept.py --location bloomington --output cities/bloomington/library_intercept.ics || true
        python scrapers/buskirk_chumley.py --output cities/bloomington/buskirk_chumley.ics || true
        python scrapers/comedy_attic.py --output cities/bloomington/comedy_attic.ics || true
        python scrapers/the_bishop.py --output cities/bloomington/the_bishop.ics || true
        python scrapers/squarespace.py --url "https://www.peoplesmarketbtown.org/gatherings" --name "People's Market" -o cities/bloomington/peoples_market.ics || true
        python scrapers/bluebird.py --output cities/bloomington/bluebird.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3607354-blockhouse-bar" --name "Blockhouse Bar" --output cities/bloomington/songkick_blockhouse.ics || true
        python scrapers/squarespace.py --url "https://www.cardinalspirits.com/events" --name "Cardinal Spirits" -o cities/bloomington/cardinal_spirits.ics || true
        python scrapers/squarespace.py --url "https://www.sassafrasaudubon.org/upcomingevents" --name "Sassafras Audubon Society" -o cities/bloomington/sassafras_audubon.ics || true
        python scrapers/squarespace.py --url "https://www.mcmga.net/events" --name "Monroe County Master Gardeners" -o cities/bloomington/master_gardeners.ics || true
        python scrapers/sycamore_land_trust.py --output cities/bloomington/sycamore_land_trust.ics || true
        python scrapers/spektrix.py --base-url "https://tickets.seeconstellation.org/constellation" --name "Constellation Stage & Screen" --output cities/bloomington/constellation.ics || true
        python scrapers/shopify_events.py --url "https://cicadacinema.com" --name "Cicada Cinema" --output cities/bloomington/cicada_cinema.ics || true
        python scrapers/mobilize.py --url "https://www.mobilize.us/indivisiblecentralindiana/" --name "Indivisible Central Indiana (Mobilize)" --output cities/bloomington/mobilize_indivisible_central_indiana.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/morgenstern-books-34376767621" --name "Morgenstern Books" --output cities/bloomington/eventbrite_morgenstern_books.ics || true
        python scrapers/wfhb_calendar.py --output cities/bloomington/wfhb_calendar.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/nerd-nite-bloomington-95199764993" --name "Nerd Nite Bloomington" --output cities/bloomington/eventbrite_nerd_nite.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/the-tap-bloomington-69461600243" --name "The Tap" --output cities/bloomington/eventbrite_the_tap.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/martinsville-arts-council-59689470843" --name "Martinsville Arts Council" --output cities/bloomington/eventbrite_martinsville_arts.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/story-inn-825970603" --name "Story Inn" --output cities/bloomington/eventbrite_story_inn.ics || true
        python scrapers/writers_guild.py --output cities/bloomington/writers_guild.ics || true
        python scrapers/far_center.py --output cities/bloomington/far_center.ics || true
        python scrapers/habitat.py --output cities/bloomington/habitat.ics || true
        python scrapers/nami_bloomington.py --output cities/bloomington/nami_bloomington.ics || true
        python scrapers/monroe_county_history_center.py --output cities/bloomington/monroe_county_history_center.ics || true
        python scrapers/localist.py --base-url "https://events.in.gov" --venue-id 35217665860404 --name "McCormick's Creek State Park" --output cities/bloomington/localist_mccormicks_creek.ics || true
        python scrapers/localist.py --base-url "https://events.in.gov" --venue-id 35217662417669 --name "Brown County State Park" --output cities/bloomington/localist_brown_county_sp.ics || true
        python scrapers/bloomington_arts_today.py --output cities/bloomington/bloomington_arts_today.ics || true
        # College athletics (Sidearm v3 Calendar API)
        python scrapers/sidearm.py --base-url "https://iuhoosiers.com" --name "IU Athletics" --timezone America/Indiana/Indianapolis --home-only -o cities/bloomington/iu_athletics.ics || true
      continue-on-error: true


    # ==========================================
    # Davis
    # ==========================================
    - name: Scrape Davis sources
      if: contains(steps.locations.outputs.list, 'davis') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Davis..."
        python scrapers/ucdavis_arts.py --output cities/davis/ucdavis_arts.ics || true
        python scrapers/ucdavis_library.py --output cities/davis/ucdavis_library.ics || true
        python scrapers/ucdavis_campusgroups.py --output cities/davis/ucdavis_campusgroups.ics || true
        python scrapers/davis_downtown.py --output cities/davis/davis_downtown.ics || true
        python scrapers/yolo_library.py --output cities/davis/yolo_library.ics || true
        python scrapers/uudavis.py --output cities/davis/uudavis.ics || true
        python cities/davis/scrapers/mondavi_center.py --output cities/davis/mondavi_center.ics || true
        python scrapers/davis_chamber.py --output cities/davis/davis_chamber.ics || true
        python scrapers/ucdavis_athletics.py --output cities/davis/ucdavis_athletics.ics || true
        python scrapers/mobilize.py --url "https://www.mobilize.us/indivisibleyolo/" --name "Indivisible Yolo (Mobilize)" --output cities/davis/mobilize_indivisible_yolo.ics || true
      continue-on-error: true


    # ==========================================
    # Petaluma
    # ==========================================
    - name: Scrape Petaluma sources
      if: contains(steps.locations.outputs.list, 'petaluma') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Petaluma..."
        python scripts/library_intercept.py --location petaluma --output cities/petaluma/library_intercept.ics || true
        python scrapers/mystic_theatre.py --output cities/petaluma/mystic_theatre.ics || true
        # High school athletics
        python scrapers/maxpreps.py --school petaluma-trojans --output cities/petaluma/maxpreps_petaluma_high.ics || true
        python scrapers/maxpreps.py --school casa-grande-gauchos --output cities/petaluma/maxpreps_casa_grande.ics || true
        # Petaluma Chamber of Commerce (GrowthZone)
        python scrapers/growthzone.py --site petalumachamber --output cities/petaluma/petaluma_chamber.ics || true
        python scrapers/srjc_petaluma.py --output cities/petaluma/srjc_petaluma.ics || true
        # HenHouse Brewing and Phoenix Theater
        python scrapers/henhouse.py > cities/petaluma/henhouse.ics || true
        # Mercury Theater and Adobe Road Winery
        python scrapers/mercury_theater.py --output cities/petaluma/mercury_theater.ics || true
        python scrapers/adobe_road.py --output cities/petaluma/adobe_road.ics || true
        # Squarespace venues
        python scrapers/petaluma_arts_center.py --output cities/petaluma/petaluma_arts_center.ics || true
        python scrapers/brewsters.py --output cities/petaluma/brewsters.ics || true
        python scrapers/cool_petaluma.py --output cities/petaluma/cool_petaluma.ics || true
        python scrapers/petaluma_river_park.py --output cities/petaluma/petaluma_river_park.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/78957912343" --name "Blue Zones Project Petaluma" --output cities/petaluma/bluezones_petaluma.ics || true
      continue-on-error: true


    # ==========================================
    # Toronto
    # ==========================================
    - name: Scrape Toronto sources
      if: contains(steps.locations.outputs.list, 'toronto') && github.event.inputs.regenerate_only != 'true'
      env:
        TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
      run: |
        echo "Scraping Toronto..."
        python scrapers/uoft_events.py -o cities/toronto/uoft_events.ics || true
        python scrapers/squarespace.py --url https://nativeearth.ca/shows/all-shows --name "Native Earth Performing Arts" -o cities/toronto/native_earth.ics || true
        python scrapers/toronto_meetings.py -o cities/toronto/toronto_meetings.ics || true
        python scrapers/toronto_festivals.py -o cities/toronto/toronto_festivals.ics || true
        python scrapers/volunteer_toronto.py -o cities/toronto/volunteer_toronto.ics || true
        python scrapers/toronto_public_library.py -o cities/toronto/tpl_events.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAFFE1A --name "Scotiabank Arena" --timezone America/Toronto -o cities/toronto/scotiabank_arena.ics || true
        python scrapers/ticketmaster.py --venue-id KovZ917AJ4f --name "History" --timezone America/Toronto -o cities/toronto/history.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpa3yBe --name "Danforth Music Hall" --timezone America/Toronto -o cities/toronto/danforth_music_hall.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAdIFJA --name "Lee's Palace" --timezone America/Toronto -o cities/toronto/lees_palace.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAFnlnA --name "Massey Hall" --timezone America/Toronto -o cities/toronto/massey_hall.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAdt7JA --name "Horseshoe Tavern" --timezone America/Toronto -o cities/toronto/horseshoe_tavern.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAdIFtA --name "Queen Elizabeth Theatre" --timezone America/Toronto -o cities/toronto/queen_elizabeth_theatre.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAFl6JA --name "Roy Thomson Hall" --timezone America/Toronto -o cities/toronto/roy_thomson_hall.ics || true
        python scrapers/guildhost.py --group civic-tech-toronto --name "Civic Tech Toronto" --output cities/toronto/guildhost_civic_tech.ics || true
      continue-on-error: true


    # ==========================================
    # Raleigh-Durham
    # ==========================================
    - name: Scrape Raleigh-Durham sources
      if: contains(steps.locations.outputs.list, 'raleighdurham') && github.event.inputs.regenerate_only != 'true'
      run: |
        python scrapers/legistar.py --client wake --source "Wake County" -o cities/raleighdurham/wake_county_legistar.ics || true
        python scrapers/legistar.py --client chapelhill --source "Town of Chapel Hill" -o cities/raleighdurham/chapelhill_legistar.ics || true
        python scrapers/legistar.py --client durhamcounty --source "Durham County" -o cities/raleighdurham/durhamcounty_legistar.ics || true
        python scrapers/growthzone.py --site durhamchamber --output cities/raleighdurham/durham_chamber.ics || true
        python scrapers/growthzone.py --site wakeforestchamber --output cities/raleighdurham/wakeforest_chamber.ics || true
        python scrapers/growthzone.py --site apexchamber --output cities/raleighdurham/apex_chamber.ics || true
        # Squarespace scrapers
        python scrapers/squarespace.py --url "https://ponysaurusbrewing.com/events" --name "Ponysaurus Brewing" -o cities/raleighdurham/ponysaurus.ics || true
        python scrapers/squarespace.py --url "https://scrapexchange.org/tsecalendar" --name "The Scrap Exchange" -o cities/raleighdurham/scrap_exchange.ics || true
        python scrapers/squarespace.py --url "https://keepdurhambeautiful.org/events" --name "Keep Durham Beautiful" -o cities/raleighdurham/keep_durham_beautiful.ics || true
        python scrapers/squarespace.py --url "https://hawriver.org/events" --name "Haw River Assembly" -o cities/raleighdurham/haw_river_assembly.ics || true
        python scrapers/catscradle.py --output cities/raleighdurham/catscradle.ics || true
        python scrapers/motorco.py --output cities/raleighdurham/motorco.ics || true
        python scrapers/carolina_theatre.py --output cities/raleighdurham/carolina_theatre.ics || true
        python scrapers/carolina_performing_arts.py --output cities/raleighdurham/carolina_performing_arts.ics || true
        python scrapers/duke_arts.py --output cities/raleighdurham/duke_arts.ics || true
        python scrapers/raleigh_little_theatre.py --output cities/raleighdurham/raleigh_little_theatre.ics || true
        # Ticketmaster venues
        python scrapers/ticketmaster.py --venue-id KovZpa2X8e --name "DPAC" -o cities/raleighdurham/dpac.ics || true
        python scrapers/ticketmaster.py --venue-id KovZpZAFF1nA --name "Martin Marietta Center" -o cities/raleighdurham/martin_marietta.ics || true
      env:
        TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
      continue-on-error: true


    # ==========================================
    # Montclair
    # ==========================================
    - name: Scrape Montclair sources
      if: contains(steps.locations.outputs.list, 'montclair') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Montclair..."
        python scrapers/growthzone.py --url "https://business.northessexchamber.com/api/events" --name "North Essex Chamber of Commerce" --output cities/montclair/north_essex_chamber.ics || true
        python scrapers/maxpreps.py --url "https://www.maxpreps.com/nj/montclair/montclair-mounties/events/" --name "Montclair High School" --timezone America/New_York --output cities/montclair/maxpreps_montclair_high.ics || true
        python scrapers/maxpreps.py --url "https://www.maxpreps.com/nj/montclair/montclair-kimberley-academy-cougars/events/" --name "Montclair Kimberley Academy" --timezone America/New_York --output cities/montclair/maxpreps_mka.ics || true
        python scrapers/squarespace.py --url "https://www.lackawanna.com/events" --name "Lackawanna Station" --output cities/montclair/lackawanna.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/montclair-brewery-17088451648" --name "Montclair Brewery" --output cities/montclair/eventbrite_montclair_brewery.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/montclair-book-center-76893048773" --name "Montclair Book Center" --output cities/montclair/eventbrite_montclair_book_center.ics || true
